name: Acceptance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      NODE_OPTIONS: --max-old-space-size=8192
      JWT_SECRET: ci_local_acceptance_jwt_secret
      COOKIE_SECRET: ci_local_acceptance_cookie_secret
      MANUAL_WEBHOOK_SECRET: ci_local_acceptance_manual_webhook_secret
      CREDENTIAL_ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
      DELIVERY_ENCRYPTION_KEY: "2222222222222222222222222222222222222222222222222222222222222222"
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_ci_local_acceptance

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare env files
        run: |
          cp apps/backend/.env.template apps/backend/.env
          cp apps/storefront/.env.example apps/storefront/.env.local

      - name: Run build-level acceptance
        run: pnpm acceptance:build

      - name: Run live order acceptance
        run: pnpm acceptance:live
