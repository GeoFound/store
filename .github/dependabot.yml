version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      npm-security-and-patches:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:45"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
