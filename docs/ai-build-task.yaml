version: "1.0"
project:
  name: "single-store-digital-goods"
  type: "independent-store"
  description: "单店自营虚拟数字商品独立站"
  primary_spec: "docs/independent-store-spec.md"
  operating_model: "ai_implements_human_decides"

principles:
  - "小麻雀五脏俱全：购买、支付、库存、交付、售后、后台、审计闭环完整。"
  - "保持模块化单体，不做多商户平台，不做复杂微服务。"
  - "Medusa 原生能力优先，不重写商品、订单、客户后台。"
  - "虚拟库存、交付、支付通道作为自定义模块补齐。"
  - "支付 provider 可插拔，但第一版只做少量必要通道。"
  - "所有核心状态落 PostgreSQL，Redis 只做队列、锁和补偿任务。"
  - "凭证加密保存，敏感查看必须审计。"
  - "新增功能通过模块、provider、handler 扩展，不污染主链路。"

agent_operating_rules:
  autonomy:
    - "AI 负责项目初始化、编码、测试、文档更新和本地验证。"
    - "AI 不停留在建议层面；能实现的任务直接实现。"
    - "AI 每完成一个阶段必须更新任务状态和变更摘要。"
    - "AI 发现实现细节未指定时，优先按现有 spec 做保守决定。"
  human_decisions:
    - "人类只处理业务方向、支付服务商选择、部署环境、域名、密钥、法律合规文本等决策。"
    - "需要人工决策时，AI 必须提出 1 到 3 个明确选项，并说明推荐项。"
    - "除人工决策点外，AI 不应频繁打断实现流程。"
  quality:
    - "每个阶段必须有可运行验证。"
    - "修改代码时同步更新相关文档。"
    - "业务状态流转必须通过 service/workflow，不直接散落 update status。"
    - "webhook、支付成功、库存预占、交付创建必须幂等。"
    - "敏感信息不能提交到仓库。"
  prohibited:
    - "不要重做 Medusa Admin。"
    - "不要把卡密、账号、密码明文长期存储。"
    - "不要把支付密钥写入数据库或仓库。"
    - "不要把虚拟凭证塞进 Medusa 订单表或商品表。"
    - "不要绕过模块 API 直接访问其他模块内部表。"
    - "不要为了未来未知需求提前做过度抽象。"

human_decision_gates:
  - id: "D1"
    title: "确认第一版支付通道"
    required_before: "M2"
    default_recommendation: "manual + one real payment provider"
    selected: "manual_only"
    options:
      - code: "manual_only"
        label: "先只做人工支付"
        impact: "最快启动，适合先打通下单和交付闭环。"
      - code: "crypto_first"
        label: "人工支付 + 加密货币"
        impact: "适合先接 USDT 等数字货币支付。"
      - code: "aggregate_first"
        label: "人工支付 + 微信支付宝聚合"
        impact: "适合国内用户优先。"
  - id: "D2"
    title: "确认虚拟商品交付方式"
    required_before: "M3"
    default_recommendation: "encrypted_credentials"
    selected: "encrypted_credentials"
    options:
      - code: "encrypted_credentials"
        label: "加密凭证交付"
        impact: "适合卡密、账号、兑换码。"
      - code: "manual_note"
        label: "后台手动填写交付"
        impact: "最快实现，但自动化较弱。"
      - code: "external_api"
        label: "调用外部 API 开通"
        impact: "适合后续对接供应商或 SaaS 权益。"
  - id: "D3"
    title: "确认部署方式"
    required_before: "M6"
    default_recommendation: "single_vps_docker"
    selected: "single_vps_docker"
    options:
      - code: "single_vps_docker"
        label: "单 VPS + Docker"
        impact: "最简单，适合小型独立站。"
      - code: "managed_db_vps_app"
        label: "托管数据库 + VPS 应用"
        impact: "数据库稳定性更好，成本略高。"
      - code: "cloud_platform"
        label: "云平台托管"
        impact: "扩展更好，但配置更复杂。"

architecture_boundaries:
  medusa_core:
    owns:
      - "products"
      - "product_variants"
      - "product_categories"
      - "carts"
      - "orders"
      - "order_line_items"
      - "customers"
      - "payment_collections"
    must_not_own:
      - "credential plaintext"
      - "final delivery payload"
      - "custom payment routing state"
  credential_inventory:
    owns:
      - "account_batches"
      - "account_items"
      - "credential encryption/decryption"
      - "inventory state transitions"
  digital_delivery:
    owns:
      - "order_deliveries"
      - "delivery snapshots"
      - "manual delivery"
      - "replacement delivery"
  payment_router:
    owns:
      - "payment_channels"
      - "payment_attempts"
      - "provider interface"
      - "webhook verification"
      - "payment query compensation"
  storefront:
    owns:
      - "home page"
      - "category page"
      - "product page"
      - "cart"
      - "checkout"
      - "guest order lookup"
      - "guest order detail"
    must_not_own:
      - "database access"
      - "credential decryption"
      - "payment webhook handling"
  admin_ui:
    owns:
      - "credential inventory pages"
      - "delivery management pages"
      - "payment channel pages"
    must_not_own:
      - "core business state machines"

milestones:
  - id: "M0"
    name: "project_foundation"
    status: "completed"
    goal: "初始化项目骨架和本地开发环境。"
    depends_on: []
    tasks:
      - id: "M0-T1"
        title: "Initialize repository structure"
        status: "completed"
        outputs:
          - "apps/backend"
          - "apps/storefront"
          - "docs"
          - "docker-compose.yml"
          - "README.md"
      - id: "M0-T2"
        title: "Scaffold Medusa backend"
        status: "completed"
        outputs:
          - "Medusa backend starts locally"
          - "Admin is reachable"
      - id: "M0-T3"
        title: "Scaffold Next.js storefront"
        status: "completed"
        outputs:
          - "Next.js storefront starts locally"
      - id: "M0-T4"
        title: "Configure PostgreSQL and Redis"
        status: "completed"
        outputs:
          - "Local database connection works"
          - "Redis connection works"
    acceptance:
      - "Backend boots without fatal errors."
      - "Storefront boots without fatal errors."
      - "Admin login page is reachable."
      - "PostgreSQL and Redis are available through docker-compose."
    verification:
      - "Run backend dev command."
      - "Run storefront dev command."
      - "Run database migration command."

  - id: "M1"
    name: "storefront_purchase_path"
    status: "completed"
    goal: "打通商品浏览、购物车、结账和订单查看。"
    depends_on:
      - "M0"
    tasks:
      - id: "M1-T1"
        title: "Build storefront layout and navigation"
        status: "completed"
      - id: "M1-T2"
        title: "Build home, category, and product pages"
        status: "completed"
      - id: "M1-T3"
        title: "Build cart and guest checkout pages"
        status: "completed"
      - id: "M1-T4"
        title: "Build guest order lookup and order detail pages"
        status: "completed"
    acceptance:
      - "User can browse products."
      - "User can add product to cart."
      - "User can reach checkout without logging in."
      - "User can enter email and save guest checkout details."
      - "Guest order lookup entry exists; real recovery is completed with the order access token module."

  - id: "M2"
    name: "payment_foundation"
    status: "completed"
    goal: "实现轻量支付插件化和至少一个可用支付方式。"
    depends_on:
      - "M1"
      - "D1"
    tasks:
      - id: "M2-T1"
        title: "Create payment_channels model"
        status: "completed"
      - id: "M2-T2"
        title: "Create payment_attempts model"
        status: "completed"
      - id: "M2-T3"
        title: "Implement PaymentProvider interface"
        status: "completed"
      - id: "M2-T4"
        title: "Implement manual payment provider"
        status: "completed"
      - id: "M2-T5"
        title: "Implement selected real payment provider"
        status: "skipped"
        decision_gate: "D1"
        note: "D1 selected manual_only; real provider is deferred until credentials/provider choice exists."
      - id: "M2-T6"
        title: "Implement webhook endpoint and idempotency"
        status: "completed"
      - id: "M2-T7"
        title: "Implement payment status polling job"
        status: "skipped"
        note: "Manual provider has no remote query API; polling is added with the first real provider."
    acceptance:
      - "Checkout can create a payment attempt."
      - "Manual payment can be marked paid through the Admin API."
      - "Webhook processing is idempotent."
      - "Failed payment attempt does not corrupt order state."
      - "User can choose another enabled payment method after failure."

  - id: "M3"
    name: "credential_inventory"
    status: "completed"
    goal: "实现虚拟库存凭证的导入、加密保存、预占、售出和释放。"
    depends_on:
      - "M2"
      - "D2"
    tasks:
      - id: "M3-T1"
        title: "Create account_batches model"
        status: "completed"
      - id: "M3-T2"
        title: "Create account_items model"
        status: "completed"
      - id: "M3-T3"
        title: "Implement credential encryption service"
        status: "completed"
      - id: "M3-T4"
        title: "Implement inventory reservation workflow"
        status: "completed"
      - id: "M3-T5"
        title: "Implement payment-time inventory finalization"
        status: "completed"
      - id: "M3-T6"
        title: "Implement expired reservation release job"
        status: "completed"
      - id: "M3-T7"
        title: "Build Admin credential inventory route"
        status: "completed"
    acceptance:
      - "Admin can import credentials."
      - "Credentials are not stored as plaintext."
      - "Paid order can reserve or consume one credential."
      - "Expired payment releases reserved inventory."
      - "Same credential cannot be sold twice."

  - id: "M4"
    name: "digital_delivery"
    status: "completed"
    goal: "实现订单交付记录、后台交付和用户查看交付内容。"
    depends_on:
      - "M3"
    tasks:
      - id: "M4-T1"
        title: "Create order_deliveries model"
        status: "completed"
      - id: "M4-T2"
        title: "Implement delivery service"
        status: "completed"
      - id: "M4-T3"
        title: "Implement manual delivery workflow"
        status: "completed"
      - id: "M4-T4"
        title: "Build Admin delivery management route"
        status: "completed"
      - id: "M4-T5"
        title: "Expose guest-safe delivery API"
        status: "completed"
      - id: "M4-T6"
        title: "Render delivery content in guest order detail"
        status: "completed"
    acceptance:
      - "Admin can see paid orders pending delivery."
      - "Admin can deliver a selected credential."
      - "Delivery creates immutable delivery record."
      - "Guest can view only their own delivery content through a valid access token."
      - "Replacement delivery does not overwrite original delivery."

  - id: "M5"
    name: "after_sales_and_audit"
    status: "completed"
    goal: "实现轻量售后和关键操作审计。"
    depends_on:
      - "M4"
    tasks:
      - id: "M5-T1"
        title: "Create after_sales model"
        status: "completed"
      - id: "M5-T2"
        title: "Create audit_logs model"
        status: "completed"
      - id: "M5-T3"
        title: "Implement sensitive credential reveal audit"
        status: "completed"
      - id: "M5-T4"
        title: "Implement manual payment and delivery audit"
        status: "completed"
      - id: "M5-T5"
        title: "Build guest after-sales entry"
        status: "completed"
      - id: "M5-T6"
        title: "Build Admin after-sales handling"
        status: "completed"
    acceptance:
      - "Customer can submit after-sales request."
      - "Admin can process after-sales request."
      - "Sensitive credential reveal writes audit log."
      - "Manual payment confirmation writes audit log."
      - "Manual replacement or refund note writes audit log."

  - id: "M6"
    name: "production_readiness"
    status: "completed"
    goal: "整理部署、环境变量、基础安全和运行文档。"
    depends_on:
      - "M5"
      - "D3"
    tasks:
      - id: "M6-T1"
        title: "Write deployment guide"
        status: "completed"
      - id: "M6-T2"
        title: "Write environment variable guide"
        status: "completed"
      - id: "M6-T3"
        title: "Add health check endpoints or scripts"
        status: "completed"
      - id: "M6-T4"
        title: "Add backup and restore notes"
        status: "completed"
      - id: "M6-T5"
        title: "Run full local acceptance test"
        status: "completed"
    acceptance:
      - "Project can be started from documentation."
      - "Required environment variables are documented."
      - "Local full purchase flow passes."
      - "Deployment path is clear."

  - id: "M7"
    name: "plugin_platform_foundation"
    status: "completed"
    goal: "把当前数字商品单店方案升级为可长期演进的插件化底座，支持能力注册、流程编排、UI 扩展和配置驱动商品模板。"
    depends_on:
      - "M6"
    tasks:
      - id: "M7-T1"
        title: "Define platform contracts and capability registry"
        status: "completed"
        outputs:
          - "Plugin manifest schema with id, version, capabilities, dependencies, enablement, and migration ownership"
          - "Capability registry for payment, delivery, policy, UI, job, hook, theme, and admin surfaces"
          - "Versioned contracts for plugin APIs and events"
          - "Feature flag and config scope model for site, product type, and channel level switching"
          - "Explicit plugin registration in backend startup config"
      - id: "M7-T2"
        title: "Refactor payment-router into a provider plugin boundary"
        status: "completed"
        outputs:
          - "Standard provider registration and versioned provider contract"
          - "Disabled or unregistered providers are hidden/rejected instead of silently falling back to no-op"
          - "Generic provider webhook endpoint dispatches by provider code"
          - "Payment channel configuration mapped to provider capabilities"
      - id: "M7-T3"
        title: "Refactor inventory and delivery into handler and policy boundaries"
        status: "completed"
        outputs:
          - "Product fulfillment policy abstraction"
          - "Inventory handler interface for reservation, release, availability, and finalization"
          - "Delivery handler interface for manual, credential, and future delivery modes"
          - "Inventory reservation and finalization mapped through policy instead of direct module coupling"
      - id: "M7-T4"
        title: "Move order-finalize and delivery side effects into workflows"
        status: "completed"
        outputs:
          - "Checkout and payment finalize workflows"
          - "Inventory reserve/release workflow steps"
          - "Paid payment finalization automatically creates inventory-backed delivery records through delivery handlers"
          - "Order access issuance and revocation are routed through an order-access provider contract"
      - id: "M7-T5"
        title: "Replace secondary cross-module effects with events and hooks"
        status: "completed"
        outputs:
          - "Event contracts for payment, delivery, order access, audit, and notification side effects"
          - "Unified observability and audit emission path"
          - "Subscribers for audit logging and async follow-up tasks"
          - "Routes and workflows no longer write side effects directly across modules"
      - id: "M7-T6"
        title: "Add storefront and admin extension registries"
        status: "completed"
        outputs:
          - "Storefront slot/theme extension surface"
          - "Admin widget/route extension surface"
          - "Plugin-owned UI entrypoints that mount into registered slots without rewriting page flows"
      - id: "M7-T7"
        title: "Add configuration-driven product templates"
        status: "completed"
        outputs:
          - "Registry-backed template definitions for credential, account, license, code, file, manual, API-based, and custom products"
          - "Template-to-fulfillment-policy mapping"
          - "Storefront and Admin reads template metadata instead of hardcoded product assumptions"
      - id: "M7-T8"
        title: "Add plugin lifecycle, fallback, and test harness"
        status: "completed"
        outputs:
          - "Enable/disable config for plugins and capabilities"
          - "No-op adapters for optional side effects and explicit readable failures for missing required capabilities"
          - "Database uniqueness and query indexes for payment, inventory, delivery, guest access, and audit records"
          - "Unit coverage for install, disable, replace, remove, snapshot, and rollback scenarios"
          - "Plugin lifecycle coverage for discovery, registration, replacement, and removal"
    acceptance:
      - "Payment provider, delivery handler, UI extension, and product policy can be enabled or disabled by configuration."
      - "Optional side effects can use fallback adapters; required payment, inventory, and delivery capabilities fail explicitly when absent."
      - "No core module writes directly into another module's internal tables for side effects."
      - "A new digital product type can be added by configuration and plugin wiring, not by rewriting the payment main flow."
      - "Storefront and Admin extension points can be mounted without editing base pages."
      - "Existing local unit suite and acceptance path still pass after the refactor."
    verification:
      - "Run `pnpm --dir apps/backend test:unit`."
      - "Run `pnpm --dir apps/backend exec tsc --noEmit`."
      - "Run `pnpm --dir apps/storefront exec tsc --noEmit`."
      - "Run `pnpm --dir apps/storefront lint`."
      - "Run `bash -n scripts/live-order-smoke.sh` and then `pnpm acceptance` when Docker services are available."

definition_of_done:
  project_done:
    - "A user can browse, buy, pay, and view delivery content."
    - "Admin can manage products, orders, customers, credentials, deliveries, payment channels, and after-sales records."
    - "At least one payment path works end to end."
    - "Credential inventory cannot be double-sold under normal concurrent purchase conditions."
    - "Webhook processing is idempotent."
    - "Sensitive credentials are encrypted at rest."
    - "Sensitive operations write audit logs."
    - "README and docs are sufficient for local startup."
  per_milestone_done:
    - "All acceptance checks pass."
    - "Tests or manual verification commands are recorded."
    - "Docs are updated if behavior changed."
    - "No unrelated large refactors are included."

status_update_policy:
  file_to_update: "docs/ai-build-task.yaml"
  when:
    - "At the start of a milestone, set that milestone to in_progress."
    - "When a task is completed, set its status to completed."
    - "When a task is blocked by a human decision, set blocked_until_decision and reference the decision gate."
    - "When a milestone is completed, set milestone status to completed."
  allowed_statuses:
    - "pending"
    - "in_progress"
    - "completed"
    - "blocked"
    - "blocked_until_decision"
    - "skipped"

recommended_next_action:
  id: "NEXT"
  action: "Start plugin platform"
  instruction: "Implement the plugin manifest, capability registry, workflows, extension slots, and configuration-driven product templates described in docs/roadmap/plugin-platform.md."
